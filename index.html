<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Advanced 3D MD Simulation Lab</title>
    <style>
        :root { --primary: #4a90e2; --bg: #050505; --panel: #151515; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 10px; background: var(--panel); border-bottom: 2px solid var(--primary); text-align: center; }
        .main-container { flex: 1; display: flex; position: relative; }
        #canvas-container { flex: 1; position: relative; }
        .ui-panel { width: 280px; background: var(--panel); padding: 15px; border-left: 1px solid #333; overflow-y: auto; font-size: 0.9em; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 8px; background: #333; border: none; color: #888; cursor: pointer; border-radius: 4px; font-size: 0.8em; }
        .tab-btn.active { background: var(--primary); color: white; }
        .control-group { margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 6px; }
        label { display: block; color: #aaa; margin-bottom: 5px; font-size: 0.75em; }
        .val-display { color: var(--primary); float: right; font-family: monospace; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn-play { background: #00e676; color: #000; }
        .btn-pause { background: #f1c40f; color: #000; }
        .btn-reset { background: #e74c3c; color: white; }
        .guide { font-size: 0.75em; color: #666; margin-top: 10px; background: #222; padding: 8px; border-radius: 4px; }
        /* stats box for mode 1 */
        #stats-box { font-size: 0.72em; color: #aaa; background: rgba(255,255,255,0.04); border-radius: 4px; padding: 8px 10px; margin-bottom: 10px; line-height: 1.8; display: none; font-family: monospace; }
        #stats-box span { color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <strong>3D MD Simulation Lab</strong> <div>植松 宏貴 ゼミ資料：計算機シミュレーション動作確認用</div>
</div>

<div class="main-container">
    <div id="canvas-container"></div>
    <div class="ui-panel">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode(1)">1.クラスター</button>
            <button class="tab-btn" onclick="switchMode(2)">2.相共存</button>
            <button class="tab-btn" onclick="switchMode(3)">3.蒸着</button>
        </div>

        <div id="controls-content"></div>

        <!-- Mode 1 stats -->
        <div id="stats-box"></div>

        <button class="btn btn-play" id="btn-toggle" onclick="togglePlay()">一時停止</button>
        <button class="btn btn-reset" onclick="initSimulation()">リセット</button>

        <div class="guide">
            <strong>操作方法:</strong><br>
            左ドラッグ：回転<br>
            右ドラッグ：平行移動<br>
            ホイール：ズーム
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/* ============================================================
   SCENE SETUP
============================================================ */
let scene, camera, renderer, controls, particles = [], isRunning = true, currentMode = 1;
const canvasContainer = document.getElementById('canvas-container');

function initScene() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, canvasContainer.clientWidth / canvasContainer.clientHeight, 0.1, 1000);
    camera.position.set(25, 20, 25);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
    canvasContainer.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x505050);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    renderUI();
    initSimulation();
    animate();
}

/* ============================================================
   HELPERS
============================================================ */
function getP(id) {
    const el = document.getElementById('param_' + id);
    return el ? parseFloat(el.value) : null;
}

function clearParticles() {
    particles.forEach(p => scene.remove(p));
    particles = [];
}

function updateStats(N, T, status) {
    const box = document.getElementById('stats-box');
    if (currentMode !== 1) { box.style.display = 'none'; return; }
    box.style.display = 'block';
    box.innerHTML =
        `状態: <span>${status}</span>`;
}

/* ============================================================
   UI
============================================================ */
function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === mode));
    document.getElementById('stats-box').style.display = 'none';
    renderUI();
    initSimulation();
}

function renderUI() {
    const content = document.getElementById('controls-content');
    if (currentMode === 1) {
        content.innerHTML = `
            <div class="control-group">
                <label>粒子数 <span class="val-display" id="val_n">20</span></label>
                <input type="range" id="param_n" min="4" max="100" value="20"
                       oninput="document.getElementById('val_n').innerText=this.value">
            </div>
            <div class="control-group">
                <label>温度 T <span class="val-display" id="val_t">0.40</span></label>
                <input type="range" id="param_t" min="0.05" max="4.0" step="0.05" value="0.40"
                       oninput="document.getElementById('val_t').innerText=parseFloat(this.value).toFixed(2)">
            </div>
            <div class="control-group">
                <label>σ (粒子サイズ) <span class="val-display" id="val_sig">1.0</span></label>
                <input type="range" id="param_sig" min="0.4" max="2.0" step="0.1" value="1.0"
                       oninput="document.getElementById('val_sig').innerText=parseFloat(this.value).toFixed(1)">
            </div>`;
    } else if (currentMode === 2) {
        content.innerHTML = `
            <div class="control-group">
                <label>格子密度 <span class="val-display" id="val_n">10</span></label>
                <input type="range" id="param_n" min="5" max="15" value="10"
                       oninput="document.getElementById('val_n').innerText=this.value">
            </div>
            <div class="control-group">
                <label>環境温度 <span class="val-display" id="val_t">2.0</span></label>
                <input type="range" id="param_t" min="0.5" max="5" step="0.1" value="2.0"
                       oninput="document.getElementById('val_t').innerText=parseFloat(this.value).toFixed(1)">
            </div>`;
    } else {
        content.innerHTML = `
            <div class="control-group">
                <label>粒子サイズ <span class="val-display" id="val_n">1.0</span></label>
                <input type="range" id="param_n" min="0.5" max="2" step="0.1" value="1.0"
                       oninput="document.getElementById('val_n').innerText=parseFloat(this.value).toFixed(1)">
            </div>
            <div class="control-group">
                <label>表面温度 <span class="val-display" id="val_t">0.5</span></label>
                <input type="range" id="param_t" min="0" max="3" step="0.1" value="0.5"
                       oninput="document.getElementById('val_t').innerText=parseFloat(this.value).toFixed(1)">
            </div>`;
    }
}

/* ============================================================
   INIT SIMULATION (dispatcher)
============================================================ */
function initSimulation() {
    if (currentMode === 1) {
        initMode1();
    } else if (currentMode === 2) {
        initMode2();
    } else {
        initMode3();
    }
}

/* ============================================================
   MODE 1 — MICROCLUSTER (LJ + velocity-rescaling thermostat)
============================================================ */
function initMode1() {
    clearParticles();
    const N   = Math.max(1, Math.round(getP('n') || 20));
    const SIG = getP('sig') || 1.0;
    const T0  = getP('t')   || 0.4;

    const geo  = new THREE.SphereGeometry(SIG * 0.5, 14, 14);
    const rows = Math.ceil(Math.cbrt(N));
    let placed = 0;

    for (let ix = 0; ix < rows && placed < N; ix++) {
        for (let iy = 0; iy < rows && placed < N; iy++) {
            for (let iz = 0; iz < rows && placed < N; iz++) {
                const mat = new THREE.MeshPhongMaterial({
                    color: 0x2dd4bf, shininess: 90, emissive: 0x0a3030
                });
                const m = new THREE.Mesh(geo, mat);
                m.position.set(
                    (ix - rows / 2 + .5) * SIG * 1.2 + (Math.random() - .5) * .1,
                    (iy - rows / 2 + .5) * SIG * 1.2 + (Math.random() - .5) * .1,
                    (iz - rows / 2 + .5) * SIG * 1.2 + (Math.random() - .5) * .1
                );
                m.userData = {
                    vx: (Math.random() - .5) * T0 * .3,
                    vy: (Math.random() - .5) * T0 * .3,
                    vz: (Math.random() - .5) * T0 * .3,
                    fx: 0, fy: 0, fz: 0,
                    type: 'cluster'
                };
                scene.add(m);
                particles.push(m);
                placed++;
            }
        }
    }
    updateStats(N, T0, '初期化');
}

function stepMode1() {
    if (particles.length === 0) return;

    const T    = getP('t')   ?? 0.4;
    const SIG  = getP('sig') ?? 1.0;
    const EPS  = 0.5;
    const RCUT = SIG * 3.2;
    const dt   = 0.03;

    // --- reset forces ---
    for (const p of particles) { p.userData.fx = 0; p.userData.fy = 0; p.userData.fz = 0; }

    // --- LJ pair forces ---
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i], b = particles[j];
            const dx = b.position.x - a.position.x;
            const dy = b.position.y - a.position.y;
            const dz = b.position.z - a.position.z;
            const r2 = dx * dx + dy * dy + dz * dz;
            if (r2 < 0.1 || r2 > RCUT * RCUT) continue;
            const s2 = (SIG * SIG) / r2, s6 = s2 * s2 * s2;
            const f  = 24 * EPS / r2 * (2 * s6 * s6 - s6);
            const clip = Math.max(-5, Math.min(5, f));
            a.userData.fx -= clip * dx; a.userData.fy -= clip * dy; a.userData.fz -= clip * dz;
            b.userData.fx += clip * dx; b.userData.fy += clip * dy; b.userData.fz += clip * dz;
        }
    }

    // --- integrate (velocity Verlet-like single step) ---
    for (const p of particles) {
        p.userData.vx += p.userData.fx * dt;
        p.userData.vy += p.userData.fy * dt;
        p.userData.vz += p.userData.fz * dt;
        p.position.x  += p.userData.vx * dt;
        p.position.y  += p.userData.vy * dt;
        p.position.z  += p.userData.vz * dt;
    }

    // --- velocity-rescaling thermostat ---
    let ke = 0;
    for (const p of particles) ke += p.userData.vx ** 2 + p.userData.vy ** 2 + p.userData.vz ** 2;
    const T_now = ke / (3 * particles.length);
    if (T_now > 1e-5) {
        const scale = Math.sqrt((T * 0.08) / T_now) * 0.1 + 0.9;
        for (const p of particles) {
            p.userData.vx *= scale;
            p.userData.vy *= scale;
            p.userData.vz *= scale;
        }
    }

    // --- COM drift correction ---
    let cx = 0, cy = 0, cz = 0;
    for (const p of particles) { cx += p.position.x; cy += p.position.y; cz += p.position.z; }
    cx /= particles.length; cy /= particles.length; cz /= particles.length;
    for (const p of particles) {
        p.position.x += (0 - cx) * 0.04;
        p.position.y += (0 - cy) * 0.04;
        p.position.z += (0 - cz) * 0.04;
    }

    // --- color by speed ---
    for (const p of particles) {
        const sp = Math.sqrt(p.userData.vx ** 2 + p.userData.vy ** 2 + p.userData.vz ** 2);
        const t2 = Math.min(1, sp / (T * 0.3 + 0.01));
        p.material.color.setHSL(0.55 - t2 * 0.45, 0.85, 0.45 + t2 * 0.15);
        p.material.emissive.setHSL(0.55 - t2 * 0.45, 0.5, t2 * 0.08);
    }

    const status = T > 1.5 ? '気化進行' : T > 0.8 ? '活発' : '準安定';
    updateStats(particles.length, T, status);
}

/* ============================================================
   MODE 2 — PHASE COEXISTENCE (unchanged)
============================================================ */
function initMode2() {
    clearParticles();
    const n = parseInt(document.getElementById('param_n').value);
    const geo = new THREE.SphereGeometry(0.6, 8, 8);
    for (let x = 0; x < n; x++) {
        for (let y = 0; y < 8; y++) {
            for (let z = 0; z < 8; z++) {
                const mat = new THREE.MeshPhongMaterial({ color: 0x00e676 });
                const m = new THREE.Mesh(geo, mat);
                m.userData = { ox: x * 2 - n, oy: y * 2, oz: z * 2 - 8 };
                scene.add(m);
                particles.push(m);
            }
        }
    }
}

/* ============================================================
   MODE 3 — DEPOSITION (unchanged)
============================================================ */
function initMode3() {
    clearParticles();
    const geo = new THREE.SphereGeometry(0.8, 8, 8);
    for (let x = -8; x <= 8; x += 2) {
        for (let z = -8; z <= 8; z += 2) {
            const m = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x444444 }));
            m.position.set(x, 0, z);
            m.userData = { fixed: true, layer: 0, radius: 0.8 };
            scene.add(m);
            particles.push(m);
        }
    }
}

/* ============================================================
   ANIMATION LOOP
============================================================ */
function animate() {
    requestAnimationFrame(animate);
    controls.update();

    if (!isRunning) { renderer.render(scene, camera); return; }

    if (currentMode === 1) {
        stepMode1();

    } else if (currentMode === 2) {
        const t = parseFloat(document.getElementById('param_t').value);
        const n = document.getElementById('param_n').value;
        if (document.getElementById('val_t')) document.getElementById('val_t').innerText = t.toFixed(1);
        if (document.getElementById('val_n')) document.getElementById('val_n').innerText = n;

        particles.forEach(p => {
            let heat = ((p.userData.ox + 10) / 20) * t;
            p.position.x = p.userData.ox + (Math.random() - .5) * heat;
            p.position.y = p.userData.oy + (Math.random() - .5) * heat;
            p.position.z = p.userData.oz + (Math.random() - .5) * heat;
            p.material.color.setHSL(0.3 - heat * 0.1, 0.8, 0.5);
        });

    } else {
        const t = parseFloat(document.getElementById('param_t').value);
        const n = document.getElementById('param_n').value;
        if (document.getElementById('val_t')) document.getElementById('val_t').innerText = t.toFixed(1);
        if (document.getElementById('val_n')) document.getElementById('val_n').innerText = n;

        if (Math.random() < 0.1) {
            const s = parseFloat(n);
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(s, 12, 12),
                new THREE.MeshPhongMaterial({ color: 0xffaa00 })
            );
            p.position.set((Math.random() - .5) * 15, 20, (Math.random() - .5) * 15);
            p.userData = { active: true, radius: s, layer: 1 };
            scene.add(p);
            particles.push(p);
        }
        particles.forEach(p => {
            if (p.userData.active) {
                p.position.y -= 0.2;
                for (let target of particles) {
                    if (p === target) continue;
                    if (p.position.distanceTo(target.position) < (p.userData.radius + target.userData.radius)) {
                        p.userData.active = false;
                        p.userData.layer = (target.userData.layer || 0) + 1;
                        p.position.x += (Math.random() - .5) * t;
                        p.position.z += (Math.random() - .5) * t;
                        p.material.color.setHSL((p.userData.layer * 40) % 360 / 360, 0.8, 0.5);
                    }
                }
            }
        });
    }

    renderer.render(scene, camera);
}

/* ============================================================
   CONTROLS
============================================================ */
function togglePlay() {
    isRunning = !isRunning;
    document.getElementById('btn-toggle').innerText = isRunning ? "一時停止" : "再開";
    document.getElementById('btn-toggle').className = isRunning ? "btn btn-pause" : "btn btn-play";
}

window.addEventListener('resize', () => {
    camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
});

initScene();
</script>
</body>
</html>
